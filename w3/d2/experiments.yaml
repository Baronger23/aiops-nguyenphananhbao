    target: api-gateway
    hypothesis: |
      Steady-state: probe pass-rate >= 99%, p99 latency < 500ms.
      Stress api-gateway CPU to 90% for 60s.
      Cascading latency on downstream services.
      Pipeline detector fires CPU/latency anomaly and RCA picks api-gateway.
    blast_radius:
      target: api-gateway container
      duration_seconds: 60
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 80% for 60s
      method: none
    measurement:

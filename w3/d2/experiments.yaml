  - id: 7
    name: log_collector_disk
    fault_type: disk_fill
    target: log-collector
    hypothesis: |
      Steady-state: probe pass-rate >= 99%.
      Fill log-collector disk to 95% for 120s, causing ingestion lag.
      Due to monitoring loop, detector is blind.
    blast_radius:
      target: log-collector container
      duration_seconds: 120
      traffic_percent: 100
    rollback:
      automatic: true
      trigger_when: probe_pass_rate < 80% for 60s
      method: docker exec log-collector rm -f /tmp/disk_fill_file
    measurement:
      metrics: [probe_pass_rate, disk_usage, ingestion_lag, detector_alerts, rca_root_service]
      capture_window_seconds: 300
    ground_truth:
      expected_root_service: log-collector
      expected_fault_class: disk_fill


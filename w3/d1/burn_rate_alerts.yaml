groups:
- name: api-slo
  rules:
  - alert: api_burn_rate_tier1
    expr: |
      (sum(rate(http_requests_total{service="api",status="fail"}[1h])) / sum(rate(http_requests_total{service="api"}[1h]))) / (1 - 0.99) >= 1.2
      AND
      (sum(rate(http_requests_total{service="api",status="fail"}[5m])) / sum(rate(http_requests_total{service="api"}[5m]))) / (1 - 0.99) >= 1.2
    labels: {severity: page, tier: "1"}
  - alert: api_burn_rate_tier2
    expr: |
      (sum(rate(http_requests_total{service="api",status="fail"}[6h])) / sum(rate(http_requests_total{service="api"}[6h]))) / (1 - 0.99) >= 0.6
      AND
      (sum(rate(http_requests_total{service="api",status="fail"}[30m])) / sum(rate(http_requests_total{service="api"}[30m]))) / (1 - 0.99) >= 0.6
    labels: {severity: page, tier: "2"}
  - alert: api_burn_rate_tier3
    expr: |
      (sum(rate(http_requests_total{service="api",status="fail"}[3d])) / sum(rate(http_requests_total{service="api"}[3d]))) / (1 - 0.99) >= 0.1
      AND
      (sum(rate(http_requests_total{service="api",status="fail"}[6h])) / sum(rate(http_requests_total{service="api"}[6h]))) / (1 - 0.99) >= 0.1
    labels: {severity: ticket, tier: "3"}

